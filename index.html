<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity 2 | Professional List Design</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0a1f44, #1f2937);
    padding: 40px;
    color: #fff;
}

/* MAIN CONTAINER */
.main-container {
    max-width: 1100px;
    margin: auto;
    text-align: center;
}

/* TITLE */
.title {
    font-size: 42px;
    margin-bottom: 40px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #ff6b35; /* orange accent */
    text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}

/* GRID */
.pages {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 30px;
}

/* CARD */
.page {
    background: rgba(30, 41, 59, 0.85); /* navy-grey blend */
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    border-left: 6px solid #e63946; /* red accent */
    transition: 0.3s ease;
    text-align: left;
}

.page:hover {
    transform: translateY(-8px);
    border-left: 6px solid #ff6b35; /* orange hover */
}

/* HEADINGS */
h3 {
    font-size: 26px;
    margin-bottom: 20px;
    color: #f1f1f1;
    border-bottom: 2px solid rgba(255,255,255,0.2);
    padding-bottom: 10px;
}

/* LISTS */
ol, ul {
    padding-left: 25px;
    font-size: 20px;
    line-height: 1.9;
}

/* ORDERED LIST */
ol {
    color: #ff6b35; /* orange */
}

/* UNORDERED LIST */
ul {
    color: #cbd5e1; /* grey-blue */
}

li {
    margin-bottom: 10px;
}

/* SUB LIST */
li ul {
    margin-top: 8px;
    font-size: 18px;
    color: #e63946; /* red accent */
}

/* FOOTER */
.footer {
    margin-top: 45px;
    font-size: 14px;
    color: #9ca3af;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 15px;
    letter-spacing: 1px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .title {
        font-size: 28px;
    }

    .page {
        padding: 22px;
    }

    h3 {
        font-size: 20px;
    }

    ol, ul {
        font-size: 17px;
    }
}
</style>
</head>

<body>

<div class="main-container">

    <div class="title">My Professional Lists</div>

    <div class="pages">

        <!-- PAGE 1 -->
        <div class="page">
            <h3>Ordered List: Favorite Fruits</h3>
            <ol>
                <li>Avocado</li>
                <li>Grapes
                    <ul>
                        <li>Apple</li>
                        <li>Melon</li>
                    </ul>
                </li>
                <li>Dragon Fruit</li>
                <li>Jack Fruit</li>
                <li>Mangosteen</li>
            </ol>
        </div>

        <!-- PAGE 2 -->
        <div class="page">
            <h3>Unordered List: Bucket List</h3>
            <ul>
                <li>France</li>
                <li>Japan</li>
                <li>China</li>
            </ul>
        </div>

    </div>

    <div class="footer">
        Designed with Navy • Red • Orange • Grey Theme | Clean Student Layout
    </div>

</div>

</body>
</html>
